<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Single File Upload Test</h2>
        <div class="file-upload-container mb-5">
            <div class="file-upload-area" id="singleFileUpload" style="cursor: pointer; padding: 2rem; border: 2px dashed #dee2e6; border-radius: 0.5rem; text-align: center; transition: all 0.3s;">
                <input type="file" id="singleFileInput" name="file" accept=".pdf,.docx,.doc,.txt" class="d-none">
                <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-3"></i>
                <p class="upload-text mb-0">Click to upload or drag & drop</p>
                <small class="text-muted">Supports PDF, DOCX, DOC, TXT (Max 16MB)</small>
            </div>
            <div class="file-list mt-3"></div>
        </div>

        <h2>Multiple File Upload Test</h2>
        <div class="file-upload-container">
            <div class="file-upload-area" id="bulkFileUploadArea" style="cursor: pointer; padding: 2rem; border: 2px dashed #dee2e6; border-radius: 0.5rem; text-align: center; transition: all 0.3s;">
                <input type="file" id="bulkFileInput" name="files" accept=".pdf,.docx,.doc,.txt" multiple class="d-none">
                <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-3"></i>
                <p class="upload-text mb-0">Click to upload or drag & drop multiple files</p>
                <small class="text-muted">Supports PDF, DOCX, DOC, TXT (Max 16MB each)</small>
            </div>
            <div class="file-list mt-3"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/file-upload.js"></script>
</body>
</html>
