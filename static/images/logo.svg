<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Document Icon -->
  <rect x="60" y="50" width="80" height="100" rx="8" fill="url(#textGradient)" stroke="#667eea" stroke-width="2"/>
  
  <!-- Document Lines -->
  <line x1="70" y1="70" x2="130" y2="70" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="85" x2="120" y2="85" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="100" x2="125" y2="100" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="115" x2="115" y2="115" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="130" x2="130" y2="130" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  
  <!-- AI Brain Icon -->
  <circle cx="120" cy="65" r="12" fill="#f093fb" stroke="#ffffff" stroke-width="2"/>
  <circle cx="115" cy="62" r="2" fill="#ffffff"/>
  <circle cx="125" cy="62" r="2" fill="#ffffff"/>
  <circle cx="120" cy="70" r="1.5" fill="#ffffff"/>
  
  <!-- Enhancement Sparkles -->
  <g fill="#f093fb">
    <polygon points="45,80 47,85 52,85 48,88 50,93 45,90 40,93 42,88 38,85 43,85" opacity="0.8"/>
    <polygon points="155,120 157,125 162,125 158,128 160,133 155,130 150,133 152,128 148,125 153,125" opacity="0.8"/>
    <polygon points="50,130 51,133 54,133 52,135 53,138 50,136 47,138 48,135 46,133 49,133" opacity="0.6"/>
  </g>
</svg>